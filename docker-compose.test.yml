version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/Dockerfile.backend.dev

    working_dir: /app

    command: sh -c "npx prisma migrate deploy && npm run test && npm run build"

    depends_on:
      - postgres

    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      JWT_SECRET: ${JWT_SECRET}

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER:  ${POSTGRES_USER}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD}
      POSTGRES_DB:  ${POSTGRES_DB}